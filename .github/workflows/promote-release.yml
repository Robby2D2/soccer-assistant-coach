name: Promote Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to promote (e.g. 1.0.14)'
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Write Play Store JSON key
        run: echo '${{ secrets.PLAY_STORE_JSON_KEY_DATA }}' > fastlane/google-play-key.json

      - name: Promote release
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: bundle exec fastlane promote_release version:${{ inputs.version }}
