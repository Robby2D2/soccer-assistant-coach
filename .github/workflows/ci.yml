name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─── Unit tests + static analysis ─────────────────────────────────────────
  unit-tests:
    name: Unit tests & analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Unit & widget tests
        run: flutter test

  # ─── Patrol E2E tests on Android ──────────────────────────────────────────
  patrol-tests:
    name: Patrol E2E tests (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install patrol_cli
        run: dart pub global activate patrol_cli

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install emulator system dependencies
        run: sudo apt-get install -y libpulse0

      # Build the test APK before the emulator starts so Gradle's heavy
      # Jetifier transforms run without competing with emulator memory.
      - name: Build Patrol test APK
        run: |
          $HOME/.pub-cache/bin/patrol build android \
            patrol_test/smoke_test.dart \
            patrol_test/settings_test.dart \
            patrol_test/notifications_test.dart \
            patrol_test/halftime_journey_test.dart \
            patrol_test/json_import_test.dart \
            patrol_test/shift_alarm_journey_test.dart \
            patrol_test/team_management_journey_test.dart \
            patrol_test/substitution_journey_test.dart \
            patrol_test/shift_management_journey_test.dart \
            patrol_test/season_clone_journey_test.dart \
            patrol_test/roster_import_journey_test.dart

      - name: Run Patrol tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: default
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none -partition-size 4096
          script: |
            $HOME/.pub-cache/bin/patrol test \
              patrol_test/smoke_test.dart \
              patrol_test/settings_test.dart \
              patrol_test/notifications_test.dart \
              patrol_test/halftime_journey_test.dart \
              patrol_test/json_import_test.dart \
              patrol_test/shift_alarm_journey_test.dart \
              patrol_test/team_management_journey_test.dart \
              patrol_test/substitution_journey_test.dart \
              patrol_test/shift_management_journey_test.dart \
              patrol_test/season_clone_journey_test.dart \
              patrol_test/roster_import_journey_test.dart
