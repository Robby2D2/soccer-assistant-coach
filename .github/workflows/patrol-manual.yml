name: Patrol E2E (manual)

# Patrol runs on demand only, not on every PR. The Patrol test orchestrator
# hangs unpredictably between tests on the Android emulator runner, so
# wiring it into PR checks blocks merges for reasons unrelated to the code
# under review. Trigger this from the Actions tab when you actually need
# to verify a Patrol journey, and provide the test file path to scope it.

on:
  workflow_dispatch:
    inputs:
      test_path:
        description: 'Patrol test file to run (e.g. patrol_test/smoke_test.dart). Leave blank for the full suite (may hang).'
        required: false
        default: 'patrol_test/smoke_test.dart'

jobs:
  patrol-tests:
    name: Patrol E2E (${{ inputs.test_path }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install patrol_cli
        # Pinned to exact version that pairs with patrol package in pubspec.yaml.
        # patrol_cli 4.4.0 is incompatible with patrol 4.5.0 (the released
        # patrol_cli enforces strict version checks). The known-good pair is
        # patrol_cli 4.3.1 + patrol 4.5.0.
        run: dart pub global activate patrol_cli 4.3.1

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install emulator system dependencies
        run: sudo apt-get install -y libpulse0

      - name: Build Patrol test APK
        run: $HOME/.pub-cache/bin/patrol build android ${{ inputs.test_path }}

      - name: Run Patrol tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: default
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none -partition-size 4096
          script: $HOME/.pub-cache/bin/patrol test ${{ inputs.test_path }}
