name: Patrol gate (sharded)

# The required patrol journey gate. Boots a headless Android emulator ON THE GITHUB RUNNER
# (reactivecircus/android-emulator-runner) and runs the patrol journey tests — nothing runs on a
# local machine. The qa-reviewer agent dispatches this against a PR branch and the release-manager
# dispatches it against `main`, then both gate on the run's conclusion.
#
# Why sharded with -t: Patrol's 4.x orchestrator hangs unpredictably BETWEEN tests when the whole
# test_bundle runs in one process. The `-t <file>` flag makes patrol build+run exactly ONE test
# (verified: "Total: 1"), so each matrix shard runs a single test with no between-tests transition
# to hang on. A flaky/hung shard trips only its own timeout instead of wedging the whole gate.
# fail-fast is off so every shard reports; the gate concludes failure if ANY shard fails.
#
# Emulator config (all hard-won): ubuntu-22.04 + api-34 google_apis x86_64 with KVM. Do NOT set
# -partition-size — an oversized userdata partition overruns the runner disk and the emulator aborts
# with a FATAL "Not enough space to create userdata partition" (which masquerades as a boot timeout).
# The disk-free + NDK-reclaim steps keep several GB of headroom so the emulator boots reliably.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch or sha) to test. Defaults to the ref the workflow is dispatched on.'
        required: false
        default: ''

jobs:
  # Discover the patrol tests dynamically so a newly-added patrol_test/*.dart is picked up
  # automatically. With a hardcoded matrix a new journey test silently fell out of the gate
  # (that's how players_count_journey_test.dart got skipped) — listing the files removes that
  # whole failure class: every top-level test runs, and its screenshot is captured, with no
  # workflow edit required when the developer adds a test.
  discover:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.list.outputs.tests }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - id: list
        # All top-level patrol_test/*.dart except the generated bundle. helpers/ is a subdir so the
        # non-recursive glob already excludes it. Emit a compact JSON array for the matrix.
        run: |
          tests=$(ls patrol_test/*.dart | grep -v 'test_bundle.dart' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "tests=$tests" >> "$GITHUB_OUTPUT"
          echo "Discovered patrol tests: $tests"

  patrol:
    name: ${{ matrix.test }}
    needs: discover
    runs-on: ubuntu-22.04
    # Observed successful shards complete in ~10-12 min end-to-end (build + boot + test). 15 min
    # gives a few minutes of buffer without making a hung shard sit for half an hour before it
    # trips the timeout. shift_management navigates a GameScreen with many always-open Drift
    # StreamBuilders and can run longer, so it keeps the same +5 min differential.
    timeout-minutes: ${{ contains(matrix.test, 'shift_management') && 20 || 15 }}
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.discover.outputs.tests) }}

    steps:
      - uses: actions/checkout@v5
        with:
          # Empty input ⇒ checkout the ref the workflow was dispatched on (github.ref).
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned: floating `stable` rolled to Flutter 3.44.5, which dropped the
          # `compileFlutterBuildDebug` Gradle task that patrol 4.5.0's Android
          # plugin depends on — breaking `patrol build android` (all shards fail
          # before any test runs). 3.44.1 is the last stable that builds the
          # patrol test APK. Bump this in lockstep with a patrol/patrol_cli
          # upgrade (which fixes the task dependency for newer Flutter).
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install patrol_cli
        # Pinned to the exact version that pairs with the patrol package in pubspec.yaml.
        # patrol_cli 4.3.1 + patrol 4.5.0 is the known-good pair.
        run: dart pub global activate patrol_cli 4.3.1

      - name: Free disk space
        # The emulator needs headroom for its userdata partition or it aborts before boot.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift /usr/local/share/powershell /usr/local/lib/node_modules
          sudo docker system prune -af || true
          sudo apt-get clean
          df -h /

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install emulator system dependencies
        run: sudo apt-get install -y libpulse0

      - name: Build Patrol test APK (single test via -t)
        run: $HOME/.pub-cache/bin/patrol build android -t ${{ matrix.test }}

      - name: Reclaim disk before emulator
        # After the APK is built we no longer need the NDK / these SDKs; removing them leaves
        # several GB of headroom so the emulator's userdata partition fits.
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/share/miniconda /opt/az /usr/lib/google-cloud-sdk 2>/dev/null || true
          df -h /

      - name: Run Patrol test (single test via -t)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          # Pin a real phone profile (~411 logical dp wide). Without this the image's
          # default AVD can render under 360 dp, which flips responsive widgets into
          # their compact layout — e.g. the game screen shows a "Next" button instead
          # of "Next Shift", so a finder for "Next Shift" finds nothing and the test
          # fails in CI while passing on a normal-width local emulator.
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 600
          # NB: no -partition-size — an oversized userdata partition overruns the runner disk.
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          # -d emulator-5554 is explicit so patrol doesn't log "No device specified".
          # Run the test + pull its captured screenshots via a committed script. This MUST be a
          # single line: android-emulator-runner executes `script:` line-by-line in separate
          # `sh -c` shells, so inline multi-line logic (the screenshot for-loop, the $? capture)
          # breaks — the loop's do/done end up in different shells and every shard fails even
          # when the tests pass. One line -> one shell -> bash runs run_and_capture.sh normally.
          script: bash patrol_test/ci/run_and_capture.sh ${{ matrix.test }}

      - name: Upload screenshot artifact
        # Per-shard artifact name (job-index is unique across the matrix); the PNG inside is
        # named after the test so the qa-reviewer agent can map it back. Runs even on a failed
        # shard so a failing UI change can still be eyeballed.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ strategy.job-index }}
          path: screenshots/*.png
          if-no-files-found: ignore

      - name: Upload logcat artifact
        # Diagnostic (issue #39): the device logcat captured by run_and_capture.sh for the
        # whole duration of the run. Uploaded even when the job is cancelled by the
        # timeout (a hung shard never reaches "Total:" in patrol's own output, so this is
        # the only way to see what was happening on-device during the hang) — the file on
        # disk survives the step that was writing to it being killed.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logcat-${{ strategy.job-index }}
          path: logcat.txt
          if-no-files-found: ignore
