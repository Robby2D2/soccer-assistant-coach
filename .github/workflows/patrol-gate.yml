name: Patrol gate

# The required patrol journey gate. Boots a headless Android emulator ON THE GITHUB RUNNER
# (reactivecircus/android-emulator-runner) and runs the patrol journey suite — nothing runs on a
# local machine. The qa-reviewer agent dispatches this against a PR branch and the release-manager
# dispatches it against `main`, then both gate on the run's conclusion.
#
# Single job (not a matrix): patrol_cli always builds and runs the full test_bundle.dart regardless
# of the target file, so sharding by file would just run the whole suite N times. The suite runs in
# ~5 min once the emulator is up.
#
# Emulator config note: -partition-size must NOT be set so large that the userdata partition
# overruns the runner disk — that makes the emulator abort with a FATAL "Not enough space to create
# userdata partition" before boot (which looks like a boot timeout). The disk-cleanup step + the
# default partition size keep it within budget. api-34 google_apis x86_64 boots reliably with KVM.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch or sha) to test. Defaults to the ref the workflow is dispatched on.'
        required: false
        default: ''

jobs:
  patrol:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5
        with:
          # Empty input ⇒ checkout the ref the workflow was dispatched on (github.ref).
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install patrol_cli
        # Pinned to the exact version that pairs with the patrol package in pubspec.yaml.
        # patrol_cli 4.3.1 + patrol 4.5.0 is the known-good pair.
        run: dart pub global activate patrol_cli 4.3.1

      - name: Free disk space
        # The emulator needs headroom for the userdata partition — without this it aborts with a
        # FATAL "Not enough space" before boot. Keep this aggressive.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift /usr/local/share/powershell /usr/local/lib/node_modules
          sudo docker system prune -af || true
          sudo apt-get clean
          df -h

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install emulator system dependencies
        run: sudo apt-get install -y libpulse0

      - name: Build Patrol test APK
        run: $HOME/.pub-cache/bin/patrol build android

      - name: Reclaim disk before emulator
        # The emulator's userdata partition needs ~7.4 GB free or it aborts with a FATAL
        # "Not enough space" before boot. After the APK is built we no longer need the NDK or
        # these large SDKs, so remove them to leave several GB of headroom (not just MBs).
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/share/miniconda /opt/az /usr/lib/google-cloud-sdk /usr/lib/jvm/temurin-8* 2>/dev/null || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"/Ruby "$AGENT_TOOLSDIRECTORY"/go 2>/dev/null || true
          df -h /

      - name: Run Patrol suite
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          disable-animations: true
          emulator-boot-timeout: 600
          # NB: no -partition-size — an oversized userdata partition overruns the runner disk and
          # aborts the emulator before boot.
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: $HOME/.pub-cache/bin/patrol test
